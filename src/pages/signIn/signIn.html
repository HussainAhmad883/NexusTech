<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusTech - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col">

    <!-- NAVIGATION BAR -->
    <nav class="bg-slate-900 text-white shadow-lg sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="../../../index.html" class="text-2xl font-bold text-cyan-400 tracking-wider">Nexus<span class="text-white">Tech</span></a>
                </div>
                <div class="hidden md:flex space-x-8 font-medium">
                    <a href="../../../index.html" class="hover:text-cyan-400 transition duration-300 py-2">Home</a>
                    <a href="../about/about.html" class="hover:text-cyan-400 transition duration-300 py-2">About</a>
                    <a href="../contact/contact.html" class="hover:text-cyan-400 transition duration-300 py-2">Contact</a>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="../signIn/signIn.html" class="text-cyan-400 font-medium py-2">Sign In</a>
                    <a href="../signUp/signUp.html" class="bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold px-4 py-2 rounded-lg transition duration-300">Sign Up</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-400 hover:text-white focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-slate-800 px-4 pt-2 pb-4 space-y-2">
            <a href="../../../index.html" class="block hover:text-cyan-400 py-2">Home</a>
            <a href="../about/about.html" class="block hover:text-cyan-400 py-2">About</a>
            <a href="../contact/contact.html" class="block hover:text-cyan-400 py-2">Contact</a>
            <hr class="border-gray-700 my-2">
            <a href="../signIn/signIn.html" class="block text-cyan-400 py-2">Sign In</a>
            <a href="../signUp/signUp.html" class="block bg-cyan-500 text-slate-900 text-center font-bold py-2 rounded-md">Sign Up</a>
        </div>
    </nav>

    <!-- SIGN IN CARD CONTENT -->
    <main class="flex-grow flex items-center justify-center px-4 py-12 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-blue-950">
        <div class="max-w-md w-full bg-slate-900/60 backdrop-blur-xl border border-slate-800 p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-white tracking-tight">Welcome Back</h2>
                <p class="text-slate-400 mt-2 text-sm">Sign in to manage your console infrastructure</p>
            </div>
            <form action="#" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">Email Address</label>
                    <input type="email" placeholder="name@company.com" class="w-full px-4 py-3 bg-slate-950/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition duration-200">
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="text-sm font-medium text-slate-300">Password</label>
                        <a href="#" class="text-xs text-cyan-400 hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" placeholder="••••••••" class="w-full px-4 py-3 bg-slate-950/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-transparent transition duration-200">
                </div>
                <div class="flex items-center">
                    <input id="remember-me" type="checkbox" class="h-4 w-4 rounded bg-slate-950 border-slate-700 text-cyan-500 focus:ring-cyan-500">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-400">Remember me for 30 days</label>
                </div>
                <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold py-3 px-4 rounded-xl transition duration-300 shadow-lg shadow-cyan-500/20">
                    Sign In
                </button>
            </form>
            <p class="text-center text-sm text-slate-400 mt-6">
                Don't have an account? <a href="../signUp/signUp.html" class="text-cyan-400 font-medium hover:underline">Sign up free</a>
            </p>
        </div>
    </main>

    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
</body>
</html>
