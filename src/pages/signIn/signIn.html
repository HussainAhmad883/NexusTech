<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusTech - Sign In</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <!-- NAVIGATION BAR -->
    <nav class="bg-slate-900 text-white shadow-lg sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="../../../index.html" class="text-2xl font-bold text-cyan-400 tracking-wider">Nexus<span class="text-white">Tech</span></a>
                </div>
                <div class="hidden md:flex space-x-8 font-medium">
                    <a href="../../../index.html" class="hover:text-cyan-400 transition duration-300 py-2">Home</a>
                    <a href="../about/about.html" class="hover:text-cyan-400 transition duration-300 py-2">About</a>
                    <a href="../contact/contact.html" class="hover:text-cyan-400 transition duration-300 py-2">Contact</a>
                </div>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="../signIn/signIn.html" class="text-cyan-400 border-b-2 border-cyan-400 py-2">Sign In</a>
                    <a href="../signUp/signUp.html" class="bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold px-4 py-2 rounded-lg transition duration-300">Sign Up</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-btn" class="text-gray-400 hover:text-white focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24" stroke="currentColor"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-slate-800 px-4 pt-2 pb-4 space-y-2">
            <a href="../../../index.html" class="block hover:text-cyan-400 py-2">Home</a>
            <a href="../about/about.html" class="block hover:text-cyan-400 py-2">About</a>
            <a href="../contact/contact.html" class="block hover:text-cyan-400 py-2">Contact</a>
            <hr class="border-gray-700 my-2">
            <a href="../signIn/signIn.html" class="block text-cyan-400 py-2">Sign In</a>
            <a href="../signUp/signUp.html" class="block bg-cyan-500 text-slate-900 text-center font-bold py-2 rounded-md">Sign Up</a>
        </div>
    </nav>

    <!-- MAIN CONTENT ACCESS AREA -->
    <main class="flex-grow flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-blue-950">
        
        <!-- [COMPONENT 1: FLOWBITE SECURITY CARD CONTAINER] -->
        <div class="w-full max-w-md bg-slate-900/60 border border-slate-800 p-8 rounded-2xl shadow-2xl backdrop-blur-xl">
            
            <div class="mb-6 text-center">
                <div class="text-3xl mb-2 text-cyan-400">🔑</div>
                <h1 class="text-2xl font-bold text-white tracking-tight">Console Access</h1>
                <p class="text-slate-400 text-xs mt-1">Provide cluster credentials to mount cloud instances.</p>
            </div>

            <!-- Core Authentication Identity Form -->
            <form action="#" method="POST" class="space-y-5">
                
                <!-- [COMPONENT 2: FLOWBITE STYLED INPUTS (EMAIL & ACCESS KEYS)] -->
                <div>
                    <label for="email" class="block mb-2 text-xs font-medium text-slate-300 uppercase tracking-wider">Identity Email</label>
                    <input type="email" id="email" required placeholder="name@company.com" class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
                </div>

                <div>
                    <label for="password" class="block mb-2 text-xs font-medium text-slate-300 uppercase tracking-wider">Access Secret Key</label>
                    <input type="password" id="password" required minlength="8" placeholder="••••••••" class="w-full p-3 bg-slate-950 border border-slate-700 rounded-xl text-sm text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-cyan-500 transition">
                </div>

                <!-- [COMPONENT 3: FLOWBITE HELPER UTILITY BAR] -->
                <div class="flex items-center justify-between text-xs">
                    <div class="flex items-center">
                        <input id="remember" type="checkbox" class="w-4 h-4 bg-slate-950 border border-slate-700 rounded focus:ring-cyan-500 text-cyan-500 focus:ring-offset-slate-950">
                        <label for="remember" class="ml-2 text-slate-400">Remember node session</label>
                    </div>
                    <a href="#" class="text-cyan-400 hover:underline font-medium">Forgot key?</a>
                </div>

                <!-- [COMPONENT 4: FLOWBITE ACTION BRAND BUTTON] -->
                <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-950 font-bold py-3 rounded-xl text-sm transition duration-300 shadow-lg shadow-cyan-500/10 focus:ring-4 focus:ring-cyan-500/30">
                    Mount Pipeline Console
                </button>
            </form>

            <div class="relative flex py-3 items-center my-2">
                <div class="flex-grow border-t border-slate-800"></div>
                <div class="flex-grow border-t border-slate-800"></div>
            </div>

            <!-- [COMPONENT 5: FLOWBITE NAVIGATION BANNER LINK] -->
            <div class="text-center mt-4">
                <p class="text-xs text-slate-400">
                    Don’t have an account? <a href="../signUp/signUp.html" class="text-cyan-400 hover:underline font-semibold ml-1">Sign up.</a>
                </p>
            </div>

        </div>
    </main>

    <!-- FOOTER SECTION -->
    <footer class="bg-slate-900 border-t border-slate-800 text-slate-400 text-xs py-6 text-center">
        <div class="max-w-7xl mx-auto px-4 flex flex-col sm:flex-row justify-between items-center gap-2 text-slate-600">
            <p>&copy; 2026 NexusTech Solutions. All rights reserved.</p>
            <p>Academic Authentication Interface Layout.</p>
        </div>
    </footer>

    <!-- Toggle Script for Navigation Grid -->
    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
    </script>
</body>
</html>
